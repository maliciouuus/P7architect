<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tchat - Your Car Your Way</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #1a3c5e; }
        ul { list-style: none; padding: 0; }
        li { margin: 10px 0; }
        a { text-decoration: none; color: #1a3c5e; background: #e8f0fe; padding: 10px 16px; border-radius: 6px; display: inline-block; }
        a:hover { background: #c5d8f8; }
        .info { color: #555; font-size: 0.9em; margin-top: 4px; }
    </style>
</head>
<body>
    <h1>Salons de tchat disponibles</h1>
    <p>Connecté en tant que : <strong>{{ request.user.username }}</strong></p>

    {% if rooms %}
        <ul>
            {% for room in rooms %}
            <li>
                <a href="{% url 'chat-room' room.name %}">{{ room.name }}</a>
                <p class="info">Créé le {{ room.created_at|date:"d/m/Y à H:i" }}</p>
            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Aucun salon de tchat disponible pour le moment.</p>
    {% endif %}
</body>
</html>

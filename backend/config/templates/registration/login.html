<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion — Your Car Your Way</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #0f2d4a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .logo {
      font-size: 11pt;
      font-weight: 700;
      color: #0f2d4a;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #d4a017; margin-right: 8px; }
    h1 { font-size: 20pt; font-weight: 800; color: #0f2d4a; margin-bottom: 28px; }
    label { display: block; font-size: 9pt; font-weight: 700; color: #5d7a8e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #c8daea;
      border-radius: 6px;
      font-size: 10.5pt;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #1a5276; }
    button {
      width: 100%;
      padding: 12px;
      background: #0f2d4a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 11pt;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #1a4a7a; }
    .error {
      background: #fdf0ee;
      border-left: 3px solid #a93226;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 9.5pt;
      color: #a93226;
      margin-bottom: 16px;
    }
    .hint { font-size: 8.5pt; color: #5d7a8e; text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="dot"></span>Your Car Your Way</div>
    <h1>Connexion</h1>

    {% if form.errors %}
    <div class="error">Identifiants incorrects. Réessayez.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Nom d'utilisateur</label>
      <input type="text" id="id_username" name="username" autofocus autocomplete="username">

      <label for="id_password">Mot de passe</label>
      <input type="password" id="id_password" name="password" autocomplete="current-password">

      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit">Se connecter</button>
    </form>

    <p class="hint">PoC tchat — Your Car Your Way · Démo</p>
  </div>
</body>
</html>
